<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Clear-space</title>
<link rel="stylesheet" href="_card.css"></head><body><div class="card-root">
<style>
  body { padding: 14px 22px; }
  .wrap { display: flex; align-items: center; gap: 24px; }
  .stage { position: relative; padding: 32px; background: var(--bg2); border-radius: 14px; }
  .stage::after { content: ""; position: absolute; inset: 12px; border: 1.5px dashed var(--as); border-radius: 8px; pointer-events: none; }
  .mark { width: 64px; height: 64px; border-radius: 14px; overflow: hidden; position: relative; z-index: 1; }
  .mark img { width: 100%; height: 100%; display: block; }
  .meta { font: 400 12.5px/1.5 var(--font-sans); color: var(--t2); max-width: 320px; }
  .meta strong { color: var(--t1); }
</style>
<div class="wrap">
  <div class="stage"><div class="mark"><img src="../assets/simular-mark-green.svg" alt=""></div></div>
  <div class="meta"><strong>Clear-space = 1× mark height.</strong> Same rule applies between the mark and the wordmark in the full lockup. Never pack against text, photo edges, or other brand marks.</div>
</div>
</div></body></html>
