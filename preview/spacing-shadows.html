<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Shadows & overlay</title>
<link rel="stylesheet" href="_card.css">
</head>
<body><div class="card-root">
<style>
  .wrap { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .item { display: flex; flex-direction: column; gap: 8px; align-items: stretch; }
  .card { height: 76px; background: var(--bgcard); border: 1px solid var(--b1); border-radius: 12px; }
  .name { font: 500 11px/1.1 var(--font-mono); color: var(--t1); }
  .desc { font: 400 10.5px/1.3 var(--font-sans); color: var(--t3); }
  .var { font: 500 10px/1 var(--font-mono); color: var(--t3); }

  /* Backdrop demo */
  .backdrop {
    position: relative; height: 76px; border-radius: 12px; overflow: hidden;
    background: linear-gradient(135deg, var(--bg3) 0%, var(--bg3h) 100%);
    border: 1px solid var(--b1);
  }
  .backdrop::after {
    content: ""; position: absolute; inset: 0;
    background: var(--overlay);
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
  }
  .backdrop-label {
    position: absolute; inset: 0; display: grid; place-items: center;
    font: 500 11px/1 var(--font-sans); color: var(--t1);
    z-index: 1;
  }
</style>
<div class="wrap">
  <div class="item"><div class="card" style="box-shadow: var(--sc)"></div><div class="name">--sc</div><div class="desc">card / modal</div></div>
  <div class="item"><div class="card" style="box-shadow: var(--thumb-shadow)"></div><div class="name">--thumb-shadow</div><div class="desc">floating thumbs</div></div>
  <div class="item"><div class="card" style="box-shadow: var(--screen-shadow)"></div><div class="name">--screen-shadow</div><div class="desc">desktop preview</div></div>
  <div class="item"><div class="backdrop"><div class="backdrop-label">Overlay</div></div><div class="name">--overlay + blur(5px)</div><div class="desc">modal backdrop</div></div>
</div>
</div></body></html>
