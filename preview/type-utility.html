<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Label & mono</title>
<link rel="stylesheet" href="_card.css">
</head>
<body><div class="card-root">
<style>
  .row { display: grid; grid-template-columns: 110px 1fr; gap: 18px; align-items: baseline; padding: 8px 0; border-bottom: 1px solid var(--b1); }
  .row:last-child { border-bottom: none; }
  .meta { font: var(--t-mono); color: var(--t3); }
</style>
<div>
  <div class="row"><div class="meta">LABEL · 10/1.5</div><div style="font: var(--t-label); color: var(--t3); letter-spacing: var(--track-label); text-transform: uppercase">SECTION DIVIDER</div></div>
  <div class="row"><div class="meta">MONO · 11/1.4</div><div style="font: var(--t-mono); color: var(--t3); text-transform: uppercase; letter-spacing: var(--track-mono);">MODEL · OPUS · 2.3K TOKENS</div></div>
</div>
</div></body></html>
