<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Accents</title>
<link rel="stylesheet" href="_card.css">
</head>
<body><div class="card-root">
<style>
  .grid { display: grid; gap: 10px; }
  .sw { display: flex; flex-direction: column; gap: 6px; }
  .chip { height: 72px; border-radius: 10px; border: 1px solid var(--b1); }
  .chip-lg { height: 86px; border-radius: 12px; padding: 10px 12px; display: flex; align-items: flex-end; }
  .chip-hero { font: 700 22px/1 var(--font-sans); letter-spacing: -0.02em; }
  .name { font: 600 12px/1.2 var(--font-sans); color: var(--t1); }
  .tok  { font: 500 10.5px/1.2 var(--font-mono); color: var(--t3); text-transform: uppercase; letter-spacing: 0.04em; }
  .hex  { font: 400 10.5px/1.2 var(--font-mono); color: var(--t3); }
  .group { font: 600 9px/1 var(--font-sans); letter-spacing: 0.08em; text-transform: uppercase; color: var(--t3); margin-bottom: 2px; }

  .grid { grid-template-columns: repeat(5, 1fr); }
</style>
<div class="grid">
  <div class="sw">
    <div class="group">Amber · approval</div>
    <div class="chip" style="background: var(--am)"></div>
    <div class="name">am</div>
    <div class="hex">#FFAB3C</div>
  </div>
  <div class="sw">
    <div class="group">Blue · external</div>
    <div class="chip" style="background: var(--bl)"></div>
    <div class="name">bl</div>
    <div class="hex">#0022FF</div>
  </div>
  <div class="sw">
    <div class="group">Coral</div>
    <div class="chip" style="background: var(--cc)"></div>
    <div class="name">cc</div>
    <div class="hex">#D4634B</div>
  </div>
  <div class="sw">
    <div class="group">Teach · purple</div>
    <div class="chip" style="background: var(--teach)"></div>
    <div class="name">teach</div>
    <div class="hex">#8b5cf6 / #7c3aed</div>
  </div>
  <div class="sw">
    <div class="group">Red · danger</div>
    <div class="chip" style="background: var(--r)"></div>
    <div class="name">r</div>
    <div class="hex">#ef4444 / #dc2626</div>
  </div>
</div>
</div></body></html>
