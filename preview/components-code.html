<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Code block</title>
<link rel="stylesheet" href="_card.css">
</head>
<body><div class="card-root">
<style>
  .block { background: var(--bg2); border: 1px solid var(--b1); border-radius: 10px; padding: 14px 16px; font: 400 12.5px/1.65 var(--font-mono); color: var(--t1); }
  .kw { color: var(--as); }
  .str { color: #C4E1FF; }
  .cm  { color: var(--t3); }
  .prompt { color: var(--as); }
</style>
<div class="block">
<span class="cm"># Agent S — open source · github.com/simular-ai/Agent-S</span><br>
<span class="prompt">$</span> pip install gui-agents<br>
<span class="prompt">$</span> agent-s <span class="kw">run</span> --model claude-sonnet \<br>
&nbsp;&nbsp;&nbsp;&nbsp;--task <span class="str">"draft three follow-up emails"</span>
</div>
</div></body></html>
