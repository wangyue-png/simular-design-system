<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Cards</title>
<link rel="stylesheet" href="_card.css">
</head>
<body><div class="card-root">
<style>
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .card { background: var(--bgcard); border: 1px solid var(--b1); border-radius: 12px; padding: 14px; display: flex; flex-direction: column; gap: 6px; box-shadow: var(--sc); }
  .card-hover { background: var(--bg3h); }
  .card-accent { border-color: var(--as); background: linear-gradient(180deg, var(--gs), transparent); }
  .eyebrow { font: var(--t-mono); color: var(--t3); }
  .title { font: 600 14px/1.3 var(--font-sans); color: var(--t1); }
  .body  { font: 400 12.5px/1.5 var(--font-sans); color: var(--t2); }
</style>
<div class="grid">
  <div class="card">
    <div class="eyebrow">RESTING</div>
    <div class="title">Works like a human</div>
    <div class="body">Clicking, typing, operating the GUI.</div>
  </div>
  <div class="card card-hover">
    <div class="eyebrow">HOVER</div>
    <div class="title">Your remote desktop</div>
    <div class="body">Private cloud machine, always on.</div>
  </div>
  <div class="card card-accent">
    <div class="eyebrow" style="color: var(--gt)">SELECTED</div>
    <div class="title">Approval-based security</div>
    <div class="body">Double-checks before critical actions.</div>
  </div>
</div>
</div></body></html>
