<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Simular wordmark</title>
<link rel="stylesheet" href="_card.css"></head><body><div class="card-root">
<style>
  body { padding: 16px 22px; }
  .wrap { display: flex; flex-direction: column; gap: 12px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .panel { padding: 22px; border-radius: 12px; display: flex; align-items: center; justify-content: center; min-height: 60px; }
  .light { background: #f9faf5; }
  .dark  { background: #0c0c0c; }
  .label { font: 500 10px/1 var(--font-mono); color: var(--t3); letter-spacing: 0.06em; text-transform: uppercase; }
  img { max-height: 28px; width: auto; display: block; }
</style>
<div class="wrap">
  <div class="row">
    <div class="panel light"><img src="../assets/simular-wordmark-black.png" alt=""></div>
    <div class="panel dark"><img src="../assets/simular-wordmark-white.png" alt=""></div>
  </div>
  <div class="row">
    <div class="label">simular-wordmark-black.png</div>
    <div class="label">simular-wordmark-white.png</div>
  </div>
</div>
</div></body></html>
