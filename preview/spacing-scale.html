<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spacing</title>
<link rel="stylesheet" href="_card.css">
</head>
<body><div class="card-root">
<style>
  .wrap { display: grid; grid-template-columns: 1fr 1.1fr; gap: 28px; align-items: start; }
  .col { display: flex; flex-direction: column; gap: 4px; }
  .row { display: grid; grid-template-columns: 50px 60px 1fr; align-items: center; gap: 12px; }
  .name { font: 500 11px/1 var(--font-mono); color: var(--t1); }
  .val  { font: 500 10.5px/1 var(--font-mono); color: var(--t3); }
  .bar  { height: 10px; background: var(--as); border-radius: 3px; opacity: 0.85; }
  .group-name { font: 500 10px/1.2 var(--font-mono); color: var(--t3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
  .pattern { display: grid; grid-template-columns: 110px 1fr; gap: 12px; padding: 2px 0; font: 400 11.5px/1.4 var(--font-sans); color: var(--t2); }
  .pattern code { font: 500 10.5px/1.4 var(--font-mono); color: var(--t3); }
</style>
<div class="wrap">
  <div class="col">
    <div class="group-name">SCALE</div>
    <div class="row"><div class="name">0.5</div><div class="val">2px</div><div class="bar" style="width:2px"></div></div>
    <div class="row"><div class="name">1</div><div class="val">4px</div><div class="bar" style="width:4px"></div></div>
    <div class="row"><div class="name">2</div><div class="val">8px</div><div class="bar" style="width:8px"></div></div>
    <div class="row"><div class="name">3</div><div class="val">12px</div><div class="bar" style="width:12px"></div></div>
    <div class="row"><div class="name">4</div><div class="val">16px</div><div class="bar" style="width:16px"></div></div>
    <div class="row"><div class="name">5</div><div class="val">20px</div><div class="bar" style="width:20px"></div></div>
    <div class="row"><div class="name">6</div><div class="val">24px</div><div class="bar" style="width:24px"></div></div>
    <div class="row"><div class="name">8</div><div class="val">32px</div><div class="bar" style="width:32px"></div></div>
  </div>
  <div class="col" style="gap: 6px;">
    <div class="group-name">COMMON PATTERNS</div>
    <div class="pattern"><code>Card padding</code><div>px-4 py-3 · 16 / 12</div></div>
    <div class="pattern"><code>Section gap</code><div>gap-4 · 16</div></div>
    <div class="pattern"><code>Inline gap</code><div>gap-2 · 8</div></div>
    <div class="pattern"><code>Tight gap</code><div>gap-1 · 4</div></div>
    <div class="pattern"><code>Page padding</code><div>px-8 · 32 (mobile px-4)</div></div>
    <div class="pattern"><code>Modal padding</code><div>px-6 py-5 · 24 / 20</div></div>
  </div>
</div>
</div></body></html>
