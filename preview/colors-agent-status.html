<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Agent run states</title>
<link rel="stylesheet" href="_card.css">
</head>
<body><div class="card-root">
<style>
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .item { padding: 12px; background: var(--bgcard); border: 1px solid var(--b1); border-radius: 12px; display: flex; flex-direction: column; gap: 8px; }
  .pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px; font: 500 11px/1.4 var(--font-sans); width: fit-content; }
  .dot { width: 6px; height: 6px; border-radius: 999px; }
  .name { font: 600 12px/1.2 var(--font-sans); color: var(--t1); }
  .hex { font: 400 10px/1.2 var(--font-mono); color: var(--t3); }
  @keyframes pulse-dot {
    0%,100% { opacity: 1; transform: scale(1); }
    50%     { opacity: 0.4; transform: scale(0.9); }
  }
  .pulse { animation: pulse-dot 1.4s ease-in-out infinite; }
</style>
<div class="grid">
  <div class="item">
    <div class="pill" style="background: var(--gs); color: var(--as)"><div class="dot pulse" style="background:var(--as)"></div>Running</div>
    <div class="name">Running</div><div class="hex">gs + as</div>
  </div>
  <div class="item">
    <div class="pill" style="background: var(--ams); color: #8a5b00"><div class="dot" style="background:var(--am)"></div>Awaiting approval</div>
    <div class="name">Approval</div><div class="hex">ams + am</div>
  </div>
  <div class="item">
    <div class="pill" style="background: var(--gs); color: var(--g)"><div class="dot" style="background:var(--g)"></div>Done</div>
    <div class="name">Done</div><div class="hex">gs + g</div>
  </div>
  <div class="item">
    <div class="pill" style="background: rgba(239,68,68,0.12); color: var(--r)"><div class="dot" style="background:var(--r)"></div>Error</div>
    <div class="name">Error</div><div class="hex">r 12% + r</div>
  </div>
  <div class="item">
    <div class="pill" style="background: var(--teach-bg); color: var(--teach-text)"><div class="dot" style="background:var(--teach)"></div>Teach</div>
    <div class="name">Teach mode</div><div class="hex">teach-bg + teach-text</div>
  </div>
</div>
</div></body></html>
