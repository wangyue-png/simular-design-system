<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Icon set</title>
<link rel="stylesheet" href="_card.css">
</head>
<body><div class="card-root">
<style>
  body { padding: 16px 18px; align-items: flex-start; }
  .icon-grid { display: flex; flex-direction: column; gap: 14px; }
  .group { display: grid; grid-template-columns: 84px 1fr; gap: 14px; align-items: start; }
  .group-name { font: 500 10px/1.2 var(--font-mono); color: var(--t3); text-transform: uppercase; letter-spacing: 0.06em; padding-top: 12px; }
  .row { display: flex; gap: 6px; flex-wrap: wrap; }
  .ic {
    width: 38px; height: 38px;
    background: var(--bgcard);
    border: 1px solid var(--b1);
    border-radius: 8px;
    display: grid; place-items: center;
    color: var(--t1);
  }
  .ic img { width: 18px; height: 18px; filter: brightness(0) invert(1); }
</style>
<div class="icon-grid">

  <div class="group">
    <div class="group-name">Navigation</div>
    <div class="row">
      <div class="ic" title="close"><img src="../assets/icons/close.svg" alt="close"></div><div class="ic" title="chevron-down"><img src="../assets/icons/chevron-down.svg" alt="chevron-down"></div><div class="ic" title="chevron-right"><img src="../assets/icons/chevron-right.svg" alt="chevron-right"></div><div class="ic" title="back-arrow"><img src="../assets/icons/back-arrow.svg" alt="back-arrow"></div><div class="ic" title="external-link"><img src="../assets/icons/external-link.svg" alt="external-link"></div>
    </div>
  </div>
  <div class="group">
    <div class="group-name">Actions</div>
    <div class="row">
      <div class="ic" title="check"><img src="../assets/icons/check.svg" alt="check"></div><div class="ic" title="search"><img src="../assets/icons/search.svg" alt="search"></div><div class="ic" title="edit"><img src="../assets/icons/edit.svg" alt="edit"></div><div class="ic" title="send"><img src="../assets/icons/send.svg" alt="send"></div><div class="ic" title="plus"><img src="../assets/icons/plus.svg" alt="plus"></div><div class="ic" title="repeat"><img src="../assets/icons/repeat.svg" alt="repeat"></div>
    </div>
  </div>
  <div class="group">
    <div class="group-name">Status</div>
    <div class="row">
      <div class="ic" title="warning"><img src="../assets/icons/warning.svg" alt="warning"></div><div class="ic" title="info"><img src="../assets/icons/info.svg" alt="info"></div><div class="ic" title="error"><img src="../assets/icons/error.svg" alt="error"></div><div class="ic" title="clock"><img src="../assets/icons/clock.svg" alt="clock"></div>
    </div>
  </div>
  <div class="group">
    <div class="group-name">Security</div>
    <div class="row">
      <div class="ic" title="lock"><img src="../assets/icons/lock.svg" alt="lock"></div><div class="ic" title="shield"><img src="../assets/icons/shield.svg" alt="shield"></div>
    </div>
  </div>
  <div class="group">
    <div class="group-name">Objects</div>
    <div class="row">
      <div class="ic" title="document"><img src="../assets/icons/document.svg" alt="document"></div><div class="ic" title="grid"><img src="../assets/icons/grid.svg" alt="grid"></div><div class="ic" title="star"><img src="../assets/icons/star.svg" alt="star"></div><div class="ic" title="bolt"><img src="../assets/icons/bolt.svg" alt="bolt"></div><div class="ic" title="book"><img src="../assets/icons/book.svg" alt="book"></div><div class="ic" title="phone"><img src="../assets/icons/phone.svg" alt="phone"></div>
    </div>
  </div>
  <div class="group">
    <div class="group-name">UI</div>
    <div class="row">
      <div class="ic" title="settings"><img src="../assets/icons/settings.svg" alt="settings"></div><div class="ic" title="sidebar"><img src="../assets/icons/sidebar.svg" alt="sidebar"></div><div class="ic" title="credit-card"><img src="../assets/icons/credit-card.svg" alt="credit-card"></div><div class="ic" title="layers"><img src="../assets/icons/layers.svg" alt="layers"></div><div class="ic" title="log-out"><img src="../assets/icons/log-out.svg" alt="log-out"></div><div class="ic" title="design-system"><img src="../assets/icons/design-system.svg" alt="design-system"></div>
    </div>
  </div>
</div>
</div></body></html>
