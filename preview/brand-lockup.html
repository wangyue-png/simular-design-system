<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Simular lockup</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 16px 22px; }
  #root { width: 100%; }
  .wrap { display: flex; flex-direction: column; gap: 14px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .panel {
    padding: 22px 26px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    min-height: 70px;
  }
  .light { background: #f9faf5; color: #0c0c0c; }
  .dark  { background: #0c0c0c; color: #fafafa; }
  .wordmark {
    font-family: var(--font-sans);
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .label { font: 500 10px/1 var(--font-mono); color: var(--t3); letter-spacing: 0.06em; text-transform: uppercase; }
</style>
</head>
<body data-screen-label="Brand lockup">

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "size": 28,
  "weight": 800,
  "tracking": -0.02,
  "casing": "UPPERCASE"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const display = t.casing === "UPPERCASE" ? "SIMULAR"
                : t.casing === "Title"     ? "Simular"
                                            : "simular";
  const style = {
    fontSize: t.size,
    fontWeight: t.weight,
    letterSpacing: t.tracking + "em",
  };

  return (
    <div className="wrap">
      <div className="row">
        <div className="panel light"><span className="wordmark" style={style}>{display}</span></div>
        <div className="panel dark"><span className="wordmark" style={style}>{display}</span></div>
      </div>
      <div className="row">
        <div className="label">Light surface · #f9faf5</div>
        <div className="label">Dark surface · #0c0c0c</div>
      </div>

      <TweaksPanel>
        <TweakSection label="Typography" />
        <TweakSlider label="Size"     value={t.size}     min={14} max={64}  step={1}     unit="px"
                     onChange={(v) => setTweak('size', v)} />
        <TweakSelect label="Weight"   value={t.weight}
                     options={[
                       { value: 300, label: "Light · 300" },
                       { value: 400, label: "Regular · 400" },
                       { value: 500, label: "Medium · 500" },
                       { value: 600, label: "SemiBold · 600" },
                       { value: 700, label: "Bold · 700" },
                       { value: 800, label: "ExtraBold · 800" },
                     ]}
                     onChange={(v) => setTweak('weight', v)} />
        <TweakSlider label="Tracking" value={t.tracking} min={-0.05} max={0.20} step={0.01} unit="em"
                     onChange={(v) => setTweak('tracking', v)} />
        <TweakRadio  label="Casing"   value={t.casing}
                     options={["lowercase", "Title", "UPPERCASE"]}
                     onChange={(v) => setTweak('casing', v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
