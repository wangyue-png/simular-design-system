<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Animations</title>
<link rel="stylesheet" href="_card.css">
</head>
<body><div class="card-root">
<style>
  body { padding: 14px 18px; align-items: flex-start; }
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; width: 100%; }
  .item {
    background: var(--bgcard); border: 1px solid var(--b1); border-radius: 10px;
    padding: 12px 10px;
    display: flex; flex-direction: column; gap: 6px; align-items: flex-start;
    min-height: 100px;
  }
  .stage { width: 100%; height: 36px; display: flex; align-items: center; justify-content: center; }
  .name { font: 500 11px/1.1 var(--font-mono); color: var(--t1); text-transform: uppercase; letter-spacing: 0.04em; }
  .desc { font: 400 10.5px/1.3 var(--font-sans); color: var(--t3); }

  /* pulse-dot */
  @keyframes pd { 0%,100% { opacity: 1; transform: scale(1) } 50% { opacity: 0.4; transform: scale(0.85) } }
  .pulse-dot { width: 12px; height: 12px; border-radius: 999px; background: var(--as); animation: pd 2s ease-in-out infinite; }

  /* working-dots */
  @keyframes wd {
    0%,80%,100% { opacity: 0.3; transform: scale(0.75) }
    40%         { opacity: 1;   transform: scale(1) }
  }
  .wd-row { display: flex; gap: 4px; }
  .wd-row > i { width: 5px; height: 5px; border-radius: 999px; background: var(--t3); display: block; }
  .wd-row > i:nth-child(1) { animation: wd 1.4s ease-in-out infinite; }
  .wd-row > i:nth-child(2) { animation: wd 1.4s ease-in-out 0.2s infinite; }
  .wd-row > i:nth-child(3) { animation: wd 1.4s ease-in-out 0.4s infinite; }

  /* running-ping */
  @keyframes rp {
    0%   { transform: scale(1);   opacity: 0.7 }
    100% { transform: scale(2.4); opacity: 0 }
  }
  .rp-wrap { position: relative; width: 14px; height: 14px; }
  .rp-wrap > i, .rp-wrap > b {
    position: absolute; inset: 0; width: 14px; height: 14px; border-radius: 999px; background: var(--as);
  }
  .rp-wrap > b { animation: rp 2s ease-out infinite; }

  /* shimmer-text */
  @keyframes shim { 0% { background-position: 200% 0 } 100% { background-position: -200% 0 } }
  .shim {
    font: 600 13px/1 var(--font-sans);
    background: linear-gradient(90deg, var(--t3), var(--t1), var(--t3));
    background-size: 200% 100%;
    -webkit-background-clip: text; background-clip: text;
    color: transparent;
    animation: shim 2.5s ease-in-out infinite;
  }

  /* fade-in */
  @keyframes fi { from { opacity: 0; transform: translateY(4px) } to { opacity: 1; transform: translateY(0) } }
  .fi { width: 22px; height: 22px; border-radius: 6px; background: var(--as); animation: fi 0.4s ease-out infinite alternate; }

  /* blink-cursor */
  @keyframes bc { 0%,49% { opacity: 1 } 50%,100% { opacity: 0 } }
  .bc-row { display: flex; align-items: center; }
  .bc-row span { font: 500 13px/1 var(--font-sans); color: var(--t2); }
  .bc-row b   { width: 2px; height: 14px; background: var(--t1); margin-left: 1px; animation: bc 0.8s steps(2) infinite; display: block; }

  /* step-log-enter */
  @keyframes sle { from { opacity: 0; transform: translateX(-6px) } to { opacity: 1; transform: translateX(0) } }
  .sle-col { display: flex; flex-direction: column; gap: 4px; width: 80%; }
  .sle-col i { height: 5px; border-radius: 999px; background: var(--teach-bg); display: block; animation: sle 0.3s ease-out infinite alternate; }
  .sle-col i:nth-child(1) { width: 100%; }
  .sle-col i:nth-child(2) { width: 70%; animation-delay: 0.1s; }
</style>
<div class="grid">
  <div class="item"><div class="stage"><div class="pulse-dot"></div></div><div class="name">pulse-dot</div><div class="desc">Live badge glow</div></div>
  <div class="item"><div class="stage"><div class="wd-row"><i></i><i></i><i></i></div></div><div class="name">working-dots</div><div class="desc">Thinking / loading</div></div>
  <div class="item"><div class="stage"><div class="rp-wrap"><i></i><b></b></div></div><div class="name">running-ping</div><div class="desc">Active task ring</div></div>
  <div class="item"><div class="stage"><div class="shim">Thinking…</div></div><div class="name">shimmer-text</div><div class="desc">Processing text</div></div>
  <div class="item"><div class="stage"><div class="fi"></div></div><div class="name">fade-in</div><div class="desc">Entry default</div></div>
  <div class="item"><div class="stage"><div class="bc-row"><span>Hello</span><b></b></div></div><div class="name">blink-cursor</div><div class="desc">Streaming text</div></div>
  <div class="item"><div class="stage"><div class="sle-col"><i></i><i></i></div></div><div class="name">step-log-enter</div><div class="desc">Step list entry</div></div>
</div>
</div></body></html>
