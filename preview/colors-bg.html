<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Backgrounds</title>
<link rel="stylesheet" href="_card.css">
</head>
<body><div class="card-root">
<style>
  .grid { display: grid; gap: 10px; }
  .sw { display: flex; flex-direction: column; gap: 6px; }
  .chip { height: 72px; border-radius: 10px; border: 1px solid var(--b1); }
  .chip-lg { height: 86px; border-radius: 12px; padding: 10px 12px; display: flex; align-items: flex-end; }
  .chip-hero { font: 700 22px/1 var(--font-sans); letter-spacing: -0.02em; }
  .name { font: 600 12px/1.2 var(--font-sans); color: var(--t1); }
  .tok  { font: 500 10.5px/1.2 var(--font-mono); color: var(--t3); text-transform: uppercase; letter-spacing: 0.04em; }
  .hex  { font: 400 10.5px/1.2 var(--font-mono); color: var(--t3); }
  .group { font: 600 9px/1 var(--font-sans); letter-spacing: 0.08em; text-transform: uppercase; color: var(--t3); margin-bottom: 2px; }

  .grid { grid-template-columns: repeat(6, 1fr); }
  .dot { width: 100%; height: 60px; border-radius: 10px; border: 1px solid var(--b1); }
</style>
<div class="grid">
  <div class="sw"><div class="dot" style="background:var(--bg)"></div><div class="name">bg</div><div class="hex">#0c0c0c / #f9faf5</div></div>
  <div class="sw"><div class="dot" style="background:var(--bg2)"></div><div class="name">bg2</div><div class="hex">#111 / #f5f6f1</div></div>
  <div class="sw"><div class="dot" style="background:var(--bg3)"></div><div class="name">bg3</div><div class="hex">#1a1a1a / #efefed</div></div>
  <div class="sw"><div class="dot" style="background:var(--bg3h)"></div><div class="name">bg3h · hover</div><div class="hex">#202020 / #e8e8e5</div></div>
  <div class="sw"><div class="dot" style="background:var(--bgcard)"></div><div class="name">bgcard</div><div class="hex">#131313 / #ffffff</div></div>
  <div class="sw"><div class="dot" style="background:var(--bgi)"></div><div class="name">bgi · inset</div><div class="hex">#1a1a1a / #f7f7f5</div></div>
</div>
</div></body></html>
