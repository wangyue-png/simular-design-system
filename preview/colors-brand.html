<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Brand color</title>
<link rel="stylesheet" href="_card.css">
</head>
<body><div class="card-root">
<style>
  .grid { display: grid; gap: 10px; }
  .sw { display: flex; flex-direction: column; gap: 6px; }
  .chip { height: 72px; border-radius: 10px; border: 1px solid var(--b1); }
  .chip-lg { height: 86px; border-radius: 12px; padding: 10px 12px; display: flex; align-items: flex-end; }
  .chip-hero { font: 700 22px/1 var(--font-sans); letter-spacing: -0.02em; }
  .name { font: 600 12px/1.2 var(--font-sans); color: var(--t1); }
  .tok  { font: 500 10.5px/1.2 var(--font-mono); color: var(--t3); text-transform: uppercase; letter-spacing: 0.04em; }
  .hex  { font: 400 10.5px/1.2 var(--font-mono); color: var(--t3); }
  .group { font: 600 9px/1 var(--font-sans); letter-spacing: 0.08em; text-transform: uppercase; color: var(--t3); margin-bottom: 2px; }

  .grid { grid-template-columns: 1.3fr 1fr 1fr 1fr 1fr 1fr; }
</style>
<div class="grid">
  <div class="sw">
    <div class="group">Brand · Lime</div>
    <div class="chip-lg chip-hero" style="background: var(--as); color: #0c0c0c;">as</div>
    <div class="name">Simular Lime</div>
    <div class="hex">#16D342 · --as</div>
  </div>
  <div class="sw">
    <div class="group">&nbsp;</div>
    <div class="chip" style="background: var(--as2)"></div>
    <div class="name">as2 · hover</div>
    <div class="hex">#12B538</div>
  </div>
  <div class="sw">
    <div class="group">&nbsp;</div>
    <div class="chip" style="background: var(--g)"></div>
    <div class="name">g · deep</div>
    <div class="hex">#0FA635</div>
  </div>
  <div class="sw">
    <div class="group">&nbsp;</div>
    <div class="chip" style="background: var(--gt)"></div>
    <div class="name">gt · text-safe</div>
    <div class="hex">#0FA635 dark</div>
  </div>
  <div class="sw">
    <div class="group">Glow</div>
    <div class="chip" style="background: var(--gg)"></div>
    <div class="name">gg · 22%</div>
    <div class="hex">22% green</div>
  </div>
  <div class="sw">
    <div class="group">Subtle</div>
    <div class="chip" style="background: var(--gs)"></div>
    <div class="name">gs · 10%</div>
    <div class="hex">10% green</div>
  </div>
</div>
</div></body></html>
