<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Simular mark</title>
<link rel="stylesheet" href="_card.css"></head><body><div class="card-root">
<style>
  body { padding: 14px 18px; }
  .wrap { display: flex; align-items: center; gap: 22px; }
  .mark { width: 88px; height: 88px; border-radius: 18px; overflow: hidden; flex: none; }
  .mark img { width: 100%; height: 100%; display: block; }
  .meta .name { font: 700 22px/1 var(--font-sans); color: var(--t1); margin-bottom: 4px; }
  .meta .role { font: 500 10px/1 var(--font-mono); color: var(--as); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
  .meta .desc { font: 400 12.5px/1.5 var(--font-sans); color: var(--t2); max-width: 360px; }
  .meta .spec { font: 400 11px/1.4 var(--font-mono); color: var(--t3); margin-top: 6px; }
</style>
<div class="wrap">
  <div class="mark"><img src="../assets/simular-mark-green.svg" alt="Simular mark"></div>
  <div class="meta">
    <div class="role">SIMULAR · PRIMARY MARK</div>
    <div class="name">Chevron-S · Lime</div>
    <div class="desc">White chevron-S in a Simular Lime rounded square. The single brand mark — use everywhere: app icon, favicon, GitHub avatar, lockups.</div>
    <div class="spec">simular-mark-green.svg · 256×256 · radius 40/256</div>
  </div>
</div>
</div></body></html>
