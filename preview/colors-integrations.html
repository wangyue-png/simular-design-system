<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Integrations</title>
<link rel="stylesheet" href="_card.css">
</head>
<body><div class="card-root">
<style>
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 10px; }
  .item { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .logo {
    width: 56px; height: 56px;
    background: var(--bgcard);
    border: 1px solid var(--b1);
    border-radius: 12px;
    display: grid; place-items: center;
  }
  .logo img { width: 26px; height: 26px; }
  .name { font: 500 10.5px/1 var(--font-sans); color: var(--t2); text-align: center; }
  .hex { font: 400 9.5px/1 var(--font-mono); color: var(--t3); }
</style>
<div class="grid">
  <div class="item"><div class="logo"><img src="../assets/integrations/linkedin.svg" alt=""></div><div class="name">LinkedIn</div><div class="hex">0A66C2</div></div>
  <div class="item"><div class="logo"><img src="../assets/integrations/gmail.svg" alt=""></div><div class="name">Gmail</div><div class="hex">EA4335</div></div>
  <div class="item"><div class="logo"><img src="../assets/integrations/salesforce.svg" alt=""></div><div class="name">Salesforce</div><div class="hex">00A1E0</div></div>
  <div class="item"><div class="logo" style="color: var(--t1)"><img src="../assets/integrations/slack.svg" alt=""></div><div class="name">Slack</div><div class="hex">4A154B</div></div>
  <div class="item"><div class="logo" style="color: var(--t1)"><img src="../assets/integrations/notion.svg" alt=""></div><div class="name">Notion</div><div class="hex">currentColor</div></div>
  <div class="item"><div class="logo" style="color: var(--t1)"><img src="../assets/integrations/x-twitter.svg" alt=""></div><div class="name">X</div><div class="hex">currentColor</div></div>
  <div class="item"><div class="logo"><img src="../assets/integrations/crunchbase.svg" alt=""></div><div class="name">Crunchbase</div><div class="hex">0288D1</div></div>
  <div class="item"><div class="logo"><img src="../assets/integrations/google-cal.svg" alt=""></div><div class="name">Google Cal</div><div class="hex">4285F4</div></div>
</div>
</div></body></html>
